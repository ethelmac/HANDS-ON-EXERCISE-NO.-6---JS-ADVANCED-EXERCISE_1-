<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript 3: Even/Odd Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .input-section { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; width: fit-content; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .even-text { color: #2c3e50; font-weight: bold; }
        .odd-text { color: #e67e22; font-weight: bold; }
        .controls { margin-top: 15px; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <h2>Even and Odd Categorizer</h2>

    <div class="input-section">
        <label>Enter Number:</label>
        <input type="number" id="numField">
        <button id="addBtn">Add Number</button>
        <button id="clearInputBtn">Clear</button>
    </div>

    <fieldset>
        <legend>Results Table</legend>
        <table>
            <thead>
                <tr>
                    <th>Value</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="numTableBody"></tbody>
        </table>
    </fieldset>

    <div class="controls">
        <button id="resetAllBtn">Reset Table</button>
        <button id="summaryBtn">Show Summary</button>
    </div>

    <div id="summaryDisplay" style="margin-top: 15px; font-style: italic;"></div>

    <script src="script.js"></script>
</body>
</html>
